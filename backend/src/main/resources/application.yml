spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finance
    username: finance
    password: finance
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
  modulith:
    events:
      jdbc:
        enabled: true
  flyway:
    baseline-on-migrate: true
finance:
  base-currency: EUR
security:
  jwt:
    issuer: financeapp
    secret: CHANGE_ME_DEV_SECRET_32_CHARS_MIN_12345
    access-token-minutes: 60
  password-reset:
    token-minutes: 30
    reset-url: http://localhost:3000/reset-password
    from-email: no-reply@family-finance.local
server:
  port: 8080
